name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION="$(node -p "require('./package.json').version")"
          echo "tag=$TAG package=$VERSION"
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Tag v$TAG does not match package.json version $VERSION. Bump package.json (and rebuild) before tagging."
            exit 1
          fi

      - name: Build
        run: npm run build

      - name: Zip extension
        run: |
          cd dist
          zip -r ../tabbie.zip .

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: tabbie.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
