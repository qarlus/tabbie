<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Focus session — site paused</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f5f0e8;
        --fg: #3d2e24;
        --muted: #7a6a5c;
        --border: rgba(92, 64, 48, 0.14);
        --card: rgba(255, 252, 247, 0.92);
        --accent: #8b5e3c;
        --accent-hover: #734d31;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #14100e;
          --fg: #f5ebe0;
          --muted: #b8a99a;
          --border: rgba(255, 236, 214, 0.12);
          --card: rgba(28, 22, 18, 0.88);
          --accent: #c49a72;
          --accent-hover: #d4aa82;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: radial-gradient(circle at 50% 0%, rgba(139, 94, 60, 0.08), transparent 55%), var(--bg);
        color: var(--fg);
      }
      main {
        width: min(100%, 28rem);
        padding: 2rem 1.75rem;
        border: 1px solid var(--border);
        border-radius: 1rem;
        background: var(--card);
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.08);
        text-align: center;
      }
      .icon {
        width: 2.5rem;
        height: 2.5rem;
        margin: 0 auto 1rem;
        border-radius: 999px;
        display: grid;
        place-items: center;
        background: rgba(139, 94, 60, 0.12);
        color: var(--accent);
        font-size: 1.25rem;
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.25rem;
        font-weight: 600;
        letter-spacing: -0.02em;
      }
      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.55;
        font-size: 0.95rem;
      }
      .focus {
        margin-top: 1.25rem;
        padding: 0.75rem 1rem;
        border-radius: 0.75rem;
        border: 1px dashed var(--border);
        font-size: 0.9rem;
        color: var(--fg);
      }
      .focus-label {
        display: block;
        margin-bottom: 0.35rem;
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
      }
      .actions {
        display: flex;
        flex-direction: column;
        gap: 0.65rem;
        margin-top: 1.5rem;
      }
      button,
      a.button {
        appearance: none;
        border: none;
        border-radius: 0.65rem;
        padding: 0.7rem 1rem;
        font: inherit;
        font-size: 0.9rem;
        font-weight: 500;
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        justify-content: center;
        align-items: center;
      }
      .primary {
        background: var(--accent);
        color: #fff;
      }
      .primary:hover {
        background: var(--accent-hover);
      }
      .ghost {
        background: transparent;
        color: var(--muted);
        border: 1px solid var(--border);
      }
      .ghost:hover {
        color: var(--fg);
      }
      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="icon" aria-hidden="true">◎</div>
      <h1>Focus session — this site is paused</h1>
      <p>Stay with what you chose. You can open a new tab or end the session when you’re ready.</p>
      <div id="focus-box" class="focus hidden">
        <span class="focus-label">Working on</span>
        <span id="focus-text"></span>
      </div>
      <div class="actions">
        <a id="new-tab" class="button primary" href="#">Go to new tab</a>
        <button id="end-session" type="button" class="ghost">End focus session</button>
      </div>
    </main>
    <script>
      const KEY = "captab-focus-block";
      const focusBox = document.getElementById("focus-box");
      const focusText = document.getElementById("focus-text");
      const newTab = document.getElementById("new-tab");
      const endSession = document.getElementById("end-session");

      newTab.href = chrome.runtime.getURL("index.html");

      function showFocus(text) {
        if (!text) return;
        focusText.textContent = text;
        focusBox.classList.remove("hidden");
      }

      function readState(cb) {
        chrome.storage.local.get(KEY, (result) => {
          cb(result[KEY] || null);
        });
      }

      readState((state) => {
        if (state && state.focusText) showFocus(state.focusText);
      });

      endSession.addEventListener("click", () => {
        const inactive = { active: false, endsAt: null, hosts: [], focusText: "" };
        chrome.storage.local.set({ [KEY]: inactive }, () => {
          window.location.href = chrome.runtime.getURL("index.html");
        });
      });
    </script>
  </body>
</html>
